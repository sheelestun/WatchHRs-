run:
  timeout: 5m
  tests: true
  skip-dirs:
    - vendor
    - mocks
  skip-files:
    - ".*\\.pb\\.go"

output:
  formats:
    - format: colored-line-number
  print-issued-lines: true
  print-linter-name: true

linters:
  disable-all: true
  enable:
    # База
    - govet
    - staticcheck
    - errcheck
    - ineffassign
    - unused
    - typecheck

    # Стиль
    - revive
    - gofmt
    - goimports
    - misspell
    - whitespace

    # Ошибки и безопасность
    - gosec
    - bodyclose
    - errorlint
    - nilerr

    # Производительность
    - prealloc
    - copyloopvar

    # Конкурентность
    - gocritic

linters-settings:
  revive:
    rules:
      - name: exported
        arguments:
          - checkPrivateReceivers
      - name: var-naming
      - name: indent-error-flow

  errcheck:
    check-type-assertions: true
    check-blank: true

  gofmt:
    simplify: true

  goimports:
    local-prefixes: your_project_name

issues:
  exclude-use-default: false
  max-issues-per-linter: 0
  max-same-issues: 0

  exclude-rules:
    - path: _test\.go
      linters:
        - errcheck
        - gosec